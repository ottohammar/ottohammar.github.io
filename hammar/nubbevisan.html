      <p>(Melodi: "Helan går", Text: Tomas A. Hammar)</p>
      <p>Hammars släkt är samlad på familjefest </p>
      <p>Få törsten släkt <br>det vore allra bäst <br>Så låt oss göra <u>slag i saken</u> <br>(Näve slås i bordet)</p>
      <p>Låt oss njuta brännvinssmaken</p>
      <p>(snapsen drickes nu)</p>
      <p>Nu är den släckt <br>i hela Hammars släkt!!</p>
